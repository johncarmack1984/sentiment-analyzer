name: Zappa

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  id-token: write   # assume the deploy role via OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # OIDC — no long-lived keys. Assumes the least-privilege deploy role
      # defined in infra/deploy.tf (AWS_ROLE_TO_ASSUME = its ARN).
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-west-1

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Set up Virtual Environment
        run: python -m venv venv

      - name: Install dependencies
        run: |
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # zappa 0.57's create_lambda_zip uses distutils.dir_util.copy_tree, which
          # breaks on setuptools' newer _distutils (ModuleNotFoundError:
          # distutils._modified, introduced in setuptools 69.5). Pin below it.
          pip install 'setuptools<69'

      - name: Deploy
        run: |
          source venv/bin/activate
          zappa update production
